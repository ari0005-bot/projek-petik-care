<svg width="300" height="200" viewBox="0 0 300 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Map Background -->
  <rect width="300" height="200" fill="#e8f5e8"/>
  
  <!-- Grid Lines -->
  <line x1="0" y1="50" x2="300" y2="50" stroke="#018C7E" strokeWidth="1" opacity="0.3"/>
  <line x1="0" y1="100" x2="300" y2="100" stroke="#018C7E" strokeWidth="1" opacity="0.3"/>
  <line x1="0" y1="150" x2="300" y2="150" stroke="#018C7E" strokeWidth="1" opacity="0.3"/>
  <line x1="75" y1="0" x2="75" y2="200" stroke="#018C7E" strokeWidth="1" opacity="0.3"/>
  <line x1="150" y1="0" x2="150" y2="200" stroke="#018C7E" strokeWidth="1" opacity="0.3"/>
  <line x1="225" y1="0" x2="225" y2="200" stroke="#018C7E" strokeWidth="1" opacity="0.3"/>
  
  <!-- Roads -->
  <path d="M50 0 L50 200" stroke="#666" strokeWidth="3"/>
  <path d="M0 100 L300 100" stroke="#666" strokeWidth="3"/>
  <path d="M150 0 L150 200" stroke="#666" strokeWidth="2"/>
  <path d="M0 50 L300 50" stroke="#666" strokeWidth="2"/>
  
  <!-- Buildings -->
  <rect x="60" y="20" width="30" height="25" fill="#999"/>
  <rect x="100" y="10" width="40" height="35" fill="#777"/>
  <rect x="160" y="25" width="25" height="20" fill="#888"/>
  <rect x="200" y="15" width="35" height="30" fill="#666"/>
  <rect x="10" y="110" width="25" height="30" fill="#999"/>
  <rect x="60" y="120" width="30" height="25" fill="#777"/>
  <rect x="170" y="115" width="40" height="35" fill="#888"/>
  <rect x="230" y="125" width="25" height="20" fill="#666"/>
  
  <!-- Location Marker -->
  <g transform="translate(150, 100)">
    <path d="M0 -15 C-8 -15, -15 -8, -15 0 C-15 8, -8 15, 0 15 C8 15, 15 8, 15 0 C15 -8, 8 -15, 0 -15 Z" fill="#ff6b6b"/>
    <circle cx="0" cy="0" r="5" fill="#fff"/>
    <path d="M0 15 L0 25" stroke="#ff6b6b" strokeWidth="2"/>
    <path d="M-5 20 L5 20" stroke="#ff6b6b" strokeWidth="2"/>
  </g>
  
  <!-- Trees -->
  <circle cx="25" cy="80" r="8" fill="#018C7E" opacity="0.6"/>
  <circle cx="280" cy="70" r="6" fill="#018C7E" opacity="0.6"/>
  <circle cx="120" cy="160" r="7" fill="#018C7E" opacity="0.6"/>
  <circle cx="250" cy="170" r="5" fill="#018C7E" opacity="0.6"/>
</svg>
